services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rentnesthub}
      MYSQL_USER: ${MYSQL_USER:-rentnest}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SERVER_PORT: "8081"
      DATABASE_DSN: ${MYSQL_USER:-rentnest}:${MYSQL_PASSWORD:-change-me}@tcp(mysql:3306)/${MYSQL_DATABASE:-rentnesthub}?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci
      UPLOAD_DIR: /data/uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
    expose:
      - "8081"
    volumes:
      - house_uploads:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - api
    volumes:
      - house_uploads:/var/www/uploads:ro

volumes:
  mysql_data:
  house_uploads:
